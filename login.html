<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - YourTube</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f9f9f9; margin: 0; }
        .login-box { background: white; padding: 40px; border: 1px solid #ddd; border-radius: 8px; text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #065fd4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 style="color:red">YourTube</h1>
        <h2>Fazer login</h2>
        <p>Use sua Conta do YourTube</p>
        <input type="email" placeholder="E-mail">
        <input type="password" placeholder="Senha">
        <button onclick="window.location.href='index.html'">Acessar</button>
        <!-- Adicione isto dentro da div .login-box no seu login.html -->
        <p style="margin-top: 20px; font-size: 14px;">
         Não tem uma conta? <a href="cadastro.html" style="color: #065fd4; text-decoration: none; font-weight: bold;">Criar conta</a>
        </p>

        <p style="font-size: 12px; color: #606060; margin-top: 20px;">Não é seu computador? Use o modo convidado.</p>
    </div>
</body>
</html>
