<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Inscrições - YourTube</title>
    <style>
        body { font-family: Roboto, Arial, sans-serif; margin: 0; background: #f9f9f9; display: flex; flex-direction: column; }
        
        header { 
            background: #fff; padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 0; box-shadow: 0 1px 5px rgba(0,0,0,0.1); z-index: 2000;
        }

        .main-layout { display: flex; }

        /* Sidebar idêntica ao index.html */
        .sidebar { width: 240px; height: calc(100vh - 56px); position: sticky; top: 56px; padding: 10px; background: #fff; border-right: 1px solid #eee; }
        .sidebar-item { padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 14px; color: black; text-decoration: none; display: flex; align-items: center; gap: 15px; }
        .sidebar-item:hover { background: #f2f2f2; }
        
        .sidebar-title { padding: 10px 15px; font-weight: bold; font-size: 16px; }
        .sidebar-channel { display: flex; align-items: center; gap: 15px; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 14px; }
        .sidebar-channel:hover { background: #f2f2f2; }
        .channel-dot { width: 24px; height: 24px; background: #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; }

        /* Grid de Vídeos das Inscrições */
        .content { flex-grow: 1; padding: 20px 40px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .video-card { cursor: pointer; }
        .thumb-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        .video-thumb { width: 100%; height: 100%; object-fit: cover; }
        .video-title { font-weight: bold; font-size: 14px; margin-top: 8px; color: #0f0f0f; }
        .video-meta { font-size: 12px; color: #606060; margin-top: 4px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: red; font-size: 24px; cursor:pointer;" onclick="window.location.href='index.html'">YourTube</div>
    <div style="font-weight: bold; font-size: 18px;">Inscrições</div>
    <div style="width: 40px;"></div>
</header>

<div class="main-layout">
    <!-- Barra Lateral -->
    <div class="sidebar">
        <div class="sidebar-item" onclick="window.location.href='index.html'">🏠 Início</div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 12px 0;">
        <div class="sidebar-title">Inscrições &rsaquo;</div>
        <div id="sidebar-lista-canais"></div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 12px 0;">
        <div class="sidebar-item" onclick="window.location.href='historico.html'">🕒 Histórico</div>
    </div>

    <!-- Conteúdo Principal -->
    <div class="content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0;">Mais recentes</h2>
            <button style="background:none; border:none; color:#065fd4; font-weight:bold; cursor:pointer;">Gerenciar</button>
        </div>
        
        <div class="video-grid" id="grid-inscricoes">
            <!-- Vídeos dos canais inscritos aparecerão aqui -->
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        const totalInscritos = parseInt(localStorage.getItem("totalInscritos") || "0");
        const meusVideos = JSON.parse(localStorage.getItem("meusVideos") || "[]");
        const grid = document.getElementById('grid-inscricoes');
        const sidebarCanais = document.getElementById('sidebar-lista-canais');
        const nomeLogado = localStorage.getItem("usuarioNome") || "Higor Bonfim";

        // 1. Mostrar canais na Sidebar
        if (totalInscritos > 0) {
            sidebarCanais.innerHTML = `
                <div class="sidebar-channel" onclick="window.location.href='canal.html'">
                    <div class="channel-dot" style="background:#0088ff;">${nomeLogado.charAt(0).toUpperCase()}</div>
                    <span>${nomeLogado}</span>
                </div>
            `;

            // 2. Mostrar VÍDEOS apenas dos canais inscritos (Simulando com o seu nome)
            // No YouTube real, filtraríamos pelo ID do canal. Aqui filtramos pelo autor logado.
            const videosInscritos = meusVideos.filter(v => v.autor === nomeLogado);

            if (videosInscritos.length === 0) {
                grid.innerHTML = "<p style='color:gray;'>Os canais inscritos ainda não postaram vídeos.</p>";
            } else {
                videosInscritos.forEach(video => {
                    grid.innerHTML += `
                        <div class="video-card" onclick="window.location.href='watch.html?v=${video.url}&t=${video.titulo}'">
                            <div class="thumb-container">
                                <video class="video-thumb" src="${video.url}"></video>
                            </div>
                            <div class="video-title">${video.titulo}</div>
                            <div class="video-meta">${video.autor} • ${video.views}</div>
                        </div>
                    `;
                });
            }
        } else {
            grid.innerHTML = "<p style='color:gray;'>Você não possui inscrições. Vá à página inicial para seguir canais!</p>";
            sidebarCanais.innerHTML = "<p style='padding:0 15px; font-size:12px; color:gray;'>Nenhuma inscrição</p>";
        }
    }
</script>

</body>
</html>
