<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico - YourTube</title>
    <style>
        body { font-family: Roboto, Arial, sans-serif; margin: 0; background: #f9f9f9; color: #0f0f0f; }
        
        header { 
            background: #fff; padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 2000; box-shadow: 0 1px 5px rgba(0,0,0,0.1);
        }

        .main-layout { display: flex; max-width: 1300px; margin: 0 auto; gap: 40px; padding: 20px; }

        /* Lista de Vídeos (Lado Esquerdo) */
        .history-content { flex: 2; }
        .section-date { font-size: 18px; font-weight: bold; margin: 30px 0 20px 0; }
        
        .video-item { display: flex; gap: 16px; margin-bottom: 20px; cursor: pointer; }
        .thumb-container { width: 246px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        
        .video-info h3 { margin: 0; font-size: 18px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-meta { font-size: 13px; color: #606060; margin-top: 5px; }

        /* Barra Lateral de Gerenciamento (Lado Direito) */
        .history-manage { flex: 1; position: sticky; top: 80px; height: fit-content; }
        .search-history { width: 100%; padding: 10px; border: none; border-bottom: 1px solid #ccc; background: transparent; outline: none; margin-bottom: 20px; }
        
        .manage-item { display: flex; align-items: center; gap: 15px; padding: 10px 0; cursor: pointer; font-size: 14px; color: #0f0f0f; }
        .manage-item:hover { color: #065fd4; }

        .btn-home { background: red; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: red; font-size: 24px; cursor:pointer;" onclick="window.location.href='index.html'">YourTube</div>
    <div style="font-weight: bold; font-size: 18px;">Histórico de exibição</div>
    <button class="btn-home" onclick="window.location.href='index.html'">Início</button>
</header>

<div class="main-layout">
    <!-- Lado Esquerdo: Lista de Vídeos -->
    <div class="history-content">
        <div id="lista-historico">
            <!-- Vídeos e datas aparecerão aqui -->
        </div>
    </div>

    <!-- Lado Direito: Gerenciamento igual à imagem -->
    <div class="history-manage">
        <input type="text" class="search-history" placeholder="Pesquisar no histórico de exibição">
        
        <div class="manage-item" onclick="limparHistorico()">🗑️ Limpar todo o histórico de exibição</div>
        <div class="manage-item">⏸️ Pausar o histórico de visualizações</div>
        <div class="manage-item">⚙️ Gerenciar histórico</div>
        
        <div style="margin-top: 20px; font-size: 13px; color: #606060;">
            <div class="manage-item">Comentários</div>
            <div class="manage-item">Postagens</div>
            <div class="manage-item">Chat ao vivo</div>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        const historico = JSON.parse(localStorage.getItem("historicoVideos") || "[]");
        const container = document.getElementById('lista-historico');
        
        if(historico.length === 0) {
            container.innerHTML = "<p style='margin-top: 50px; color: gray;'>Sua lista de histórico está vazia.</p>";
            return;
        }

        // Simula a data de "Hoje" igual à imagem
        container.innerHTML = `<div class="section-date">Hoje</div>`;

        // Mostra do mais recente para o mais antigo
        historico.reverse().forEach(video => {
            container.innerHTML += `
                <div class="video-item" onclick="window.location.href='watch.html?v=${video.url}&t=${video.titulo}'">
                    <div class="thumb-container">
                        <video class="thumb" src="${video.url}"></video>
                    </div>
                    <div class="video-info">
                        <h3>${video.titulo}</h3>
                        <div class="video-meta">${video.autor} • 0 visualizações</div>
                        <div style="font-size: 12px; color: #606060; margin-top: 10px;">
                            Descrição curta do vídeo assistido aparece aqui conforme o modelo do YouTube.
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function limparHistorico() {
        if(confirm("Tem certeza que deseja limpar todo o histórico?")) {
            localStorage.removeItem("historicoVideos");
            location.reload();
        }
    }
</script>

</body>
</html>
